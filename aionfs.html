<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>AionFS</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
input,select,textarea{font-size:16px!important;-webkit-text-size-adjust:100%}
:root{
  --bg:#0a0e0b;--sf:#111812;--sf2:#17211a;--sf3:#1e2b20;
  --bd:#243028;--bd2:#2e3d33;
  --ac:#a3e635;--ac2:#84cc16;--acbg:rgba(163,230,53,.09);--acglow:0 0 18px rgba(163,230,53,.2);
  --gn:#34d399;--gnbg:rgba(52,211,153,.10);
  --rd:#f87171;--rdbg:rgba(248,113,113,.10);
  --am:#fbbf24;--ambg:rgba(251,191,36,.10);
  --bl:#60a5fa;--blbg:rgba(96,165,250,.10);
  --tx:#fff;--tx2:#a0b8a0;--tx3:#5a7a5a;
  --r:14px;--r2:10px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg)}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;color:var(--tx);max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:0}
.screen{display:none;flex-direction:column;height:100vh;overflow:hidden}.screen.on{display:flex}
/* LOGIN */
.lg-hero{background:linear-gradient(150deg,#0d1e0e,#0a0e0b 60%);padding:44px 22px 28px;flex-shrink:0;position:relative;overflow:hidden}
.lg-hero::before{content:'';position:absolute;top:-60px;right:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(163,230,53,.12),transparent 70%)}
.lg-hero::after{content:'⚽';font-size:100px;opacity:.05;position:absolute;right:-8px;bottom:-14px;line-height:1}
.lg-title{font-size:1.9rem;font-weight:900;letter-spacing:-.04em;margin-bottom:4px}
.lg-title em{color:var(--ac);font-style:normal}
.lg-sub{color:var(--tx2);font-size:.8rem}
.lg-body{flex:1;overflow-y:auto;padding:18px 16px 12px}
.rm-card{background:var(--sf);border:1px solid var(--bd2);border-radius:var(--r);padding:13px 15px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.rm-av{width:38px;height:38px;background:linear-gradient(135deg,var(--ac2),var(--ac));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.88rem;font-weight:900;color:#000;flex-shrink:0}
.rm-info p:first-child{font-weight:700;font-size:.92rem}
.rm-info p:last-child{color:var(--tx2);font-size:.68rem;margin-top:2px}
.rm-btn{margin-left:auto;padding:8px 14px;background:var(--ac);border:none;border-radius:8px;color:#000;font-size:.8rem;font-weight:800;cursor:pointer;font-family:inherit;flex-shrink:0}
.lg-sect{font-size:.64rem;font-weight:700;color:var(--tx2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.srch-wrap{position:relative;margin-bottom:6px}
.srch-inp{width:100%;padding:13px 42px 13px 15px;background:var(--sf);border:1.5px solid var(--bd2);border-radius:var(--r2);color:#fff;font-family:inherit;outline:none;transition:border-color .2s}
.srch-inp:focus{border-color:var(--ac)}.srch-inp::placeholder{color:var(--tx3)}
.srch-ic{position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--tx3);pointer-events:none}
.srch-list{background:var(--sf2);border:1.5px solid var(--bd2);border-radius:var(--r2);max-height:240px;overflow-y:auto;display:none;margin-top:2px}
.srch-list.show{display:block}
.si{padding:11px 15px;display:flex;align-items:center;gap:9px;cursor:pointer;border-bottom:1px solid var(--bd);transition:background .1s}
.si:last-child{border-bottom:none}
.si:hover,.si:active{background:var(--acbg)}
.si-av{width:30px;height:30px;background:var(--sf3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:var(--ac);flex-shrink:0}
.si-name{font-size:.92rem;font-weight:600;flex:1}
.vbadge-sm{font-size:.62rem;padding:2px 8px;border-radius:999px;font-weight:700}
.vb-at{background:var(--gnbg);color:var(--gn)}.vb-ab{background:var(--rdbg);color:var(--rd)}
.admin-big-btn{width:100%;margin-top:14px;padding:14px;background:var(--sf2);border:1.5px solid var(--bd2);border-radius:var(--r2);color:var(--tx2);font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:all .18s;font-size:.9rem;font-weight:700}
.admin-big-btn:hover{border-color:rgba(163,230,53,.5);color:var(--ac);background:var(--acbg)}
/* HEADER */
.hdr{background:var(--sf);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd2);flex-shrink:0}
.hdr-l h1{font-size:.95rem;font-weight:800;letter-spacing:-.02em}
.hdr-l h1 em{color:var(--ac);font-style:normal}
.hdr-l small{font-size:.6rem;color:var(--tx3);display:block;margin-top:1px}
.hdr-r{display:flex;align-items:center;gap:5px}
.me-pill{background:var(--acbg);border:1px solid rgba(163,230,53,.25);border-radius:999px;padding:4px 11px;font-size:.7rem;color:var(--ac);font-weight:700}
.hbtn{background:var(--sf2);border:1px solid var(--bd2);border-radius:7px;color:var(--tx2);cursor:pointer;padding:5px 9px;font-size:.78rem;font-family:inherit}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--gn);display:none;animation:pulse 1.5s infinite}
.sdot.on{display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
/* NAV */
.content{flex:1;overflow-y:auto;padding-bottom:70px}
.tab{display:none;padding:12px}.tab.on{display:block}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(10,14,11,.97);backdrop-filter:blur(16px);border-top:1px solid var(--bd2);display:flex;z-index:50}
.nb{flex:1;padding:8px 0 11px;display:flex;flex-direction:column;align-items:center;gap:2px;background:transparent;border:none;cursor:pointer;color:var(--tx3);font-size:.52rem;font-weight:500;font-family:inherit;position:relative}
.nb.on{color:var(--ac)}
.nb.on::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:14px;height:2px;background:var(--ac);border-radius:999px}
.nb-ic{font-size:1rem}
/* SHARED */
.card{background:var(--sf);border-radius:var(--r);border:1px solid var(--bd2);padding:14px;margin-bottom:9px}
.clabel{font-size:.62rem;font-weight:700;color:var(--tx2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:9px}
.fi{width:100%;background:var(--sf2);border:1.5px solid var(--bd2);border-radius:9px;padding:11px 13px;color:#fff;font-family:inherit;outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--ac)}.fi::placeholder{color:var(--tx3)}
select.fi{cursor:pointer}
.fg{margin-bottom:9px}
.fl{font-size:.72rem;color:var(--tx2);margin-bottom:5px;font-weight:500}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.bp{width:100%;padding:12px;background:var(--ac);border:none;border-radius:9px;color:#000;font-size:.86rem;font-weight:800;cursor:pointer;font-family:inherit}
.bp:hover{background:var(--ac2)}
.bs{width:100%;padding:12px;background:transparent;border:1.5px solid var(--bd2);border-radius:9px;color:var(--tx2);font-size:.86rem;font-weight:600;cursor:pointer;font-family:inherit}
.brow{display:flex;gap:7px}.brow .bp,.brow .bs{margin-top:0}
.tag{font-size:.62rem;padding:2px 7px;border-radius:999px;font-weight:700}
.tag-gn{background:var(--gnbg);color:var(--gn)}.tag-rd{background:var(--rdbg);color:var(--rd)}
.tag-am{background:var(--ambg);color:var(--am)}.tag-bl{background:var(--blbg);color:var(--bl)}
.tag-ac{background:var(--acbg);color:var(--ac)}
.slabel{font-size:.6rem;font-weight:700;color:var(--tx2);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;padding:0 1px}
/* CALENDAR */
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-nav{background:transparent;border:1px solid var(--bd2);border-radius:6px;color:#bbb;cursor:pointer;padding:5px 10px;font-size:.78rem;font-family:inherit}
.cal-nav:hover{color:var(--ac);border-color:rgba(163,230,53,.4)}
.wk-info{text-align:center}
.wk-lbl{font-size:.76rem;font-weight:700;color:#fff}
.wk-sub{font-size:.6rem;color:var(--tx3)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cday{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 1px;border-radius:8px;transition:background .1s}
.cday.clickable{cursor:pointer}.cday.clickable:hover{background:var(--sf2)}
.cday .dow{font-size:.52rem;color:var(--tx2);font-weight:500}
.cday .dom{font-size:.8rem;font-weight:600;color:#ccc;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.cday.today .dom{background:var(--sf3);color:#fff;font-weight:700}
.cday.has-game .dow{color:var(--am)}.cday.has-game .dom{background:var(--ambg);color:var(--am);font-weight:700}
.cday.sel .dom{background:var(--ac);color:#000;font-weight:900;box-shadow:var(--acglow)}
.cday.sel .dow{color:var(--ac)}
.cday .dot{width:3px;height:3px;border-radius:50%}
.cday.has-game .dot{background:var(--am)}.cday.sel .dot{background:var(--ac)}
.sel-date-label{font-size:.78rem;font-weight:700;color:var(--ac);text-align:center;padding:6px;background:var(--acbg);border-radius:8px;margin-bottom:9px}
/* HOME */
.gc{background:linear-gradient(135deg,#0d1a0e,#0b1218);border:1px solid rgba(163,230,53,.18);border-radius:var(--r);padding:16px;margin-bottom:9px;position:relative;overflow:hidden}
.gc::before{content:'';position:absolute;top:-40px;right:-40px;width:110px;height:110px;background:radial-gradient(circle,rgba(163,230,53,.08),transparent 70%)}
.gc-venue{font-size:1.15rem;font-weight:900;letter-spacing:-.03em;margin-bottom:10px}
.gc-sect{margin-bottom:8px}
.gc-sect-t{font-size:.6rem;font-weight:700;color:var(--tx2);letter-spacing:.09em;text-transform:uppercase;margin-bottom:4px}
.gc-row{display:flex;align-items:flex-start;gap:6px;color:#ccc;font-size:.8rem;margin-bottom:3px}
.gc-links{display:flex;gap:5px;margin-top:5px}
.gc-link{font-size:.68rem;padding:4px 10px;border-radius:999px;font-weight:700;text-decoration:none;display:inline-block;border:1px solid}
.gcl-am{background:var(--ambg);border-color:rgba(251,191,36,.25);color:var(--am)}
.gcl-bl{background:var(--blbg);border-color:rgba(96,165,250,.25);color:var(--bl)}
.gcl-ac{background:var(--acbg);border-color:rgba(163,230,53,.25);color:var(--ac)}
.gc-note{background:rgba(255,255,255,.04);border-radius:7px;padding:9px 11px;font-size:.78rem;color:#bbb;line-height:1.6}
.no-game{background:var(--sf);border:1px dashed var(--bd2);border-radius:var(--r);padding:1.6rem;text-align:center;color:var(--tx2);font-size:.84rem;margin-bottom:9px}
.s3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:9px}
.sc{background:var(--sf);border:1px solid var(--bd2);border-radius:var(--r2);padding:11px 6px;text-align:center}
.sn{font-size:1.6rem;font-weight:900;letter-spacing:-.04em;line-height:1}
.sl{font-size:.58rem;color:var(--tx2);margin-top:3px}
.sc.ac .sn{color:var(--ac)}.sc.rd .sn{color:var(--rd)}.sc.gy .sn{color:#aaa}
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.chip{font-size:.7rem;padding:4px 10px;border-radius:999px;font-weight:600}
.chip.at{background:var(--gnbg);color:var(--gn);border:1px solid rgba(52,211,153,.2)}
.chip.ab{background:var(--rdbg);color:var(--rd);border:1px solid rgba(248,113,113,.2)}
.chip.nr{background:var(--sf2);color:#888;border:1px solid var(--bd)}
/* ATT */
.att-game-card{background:linear-gradient(135deg,#0d1a0e,#0b1218);border:1px solid rgba(163,230,53,.18);border-radius:var(--r);padding:13px 15px;margin-bottom:10px}
.agc-venue{font-size:1rem;font-weight:800;margin-bottom:5px}
.agc-row{display:flex;align-items:flex-start;gap:5px;font-size:.78rem;color:#bbb;margin-bottom:2px}
.vbanner{border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.vb-open{background:var(--gnbg);border:1px solid rgba(52,211,153,.25)}
.vb-closed{background:var(--rdbg);border:1px solid rgba(248,113,113,.25)}
.vb-pending{background:var(--ambg);border:1px solid rgba(251,191,36,.25)}
.vb-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.vb-title{font-size:.92rem;font-weight:800}
.vb-badge{font-size:.7rem;padding:4px 12px;border-radius:999px;font-weight:800}
.bb-open{background:var(--gn);color:#000}.bb-closed{background:var(--rd);color:#fff}.bb-pending{background:var(--am);color:#000}
.vb-range{font-size:.74rem;color:#bbb;margin-bottom:7px}
.vb-cd-wrap{background:rgba(0,0,0,.25);border-radius:9px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.vb-cd{font-size:1.4rem;font-weight:900;letter-spacing:.04em;font-variant-numeric:tabular-nums}
.vb-cd.normal{color:var(--gn)}.vb-cd.urgent{color:var(--rd);animation:urgentPulse 1s infinite}
@keyframes urgentPulse{0%,100%{opacity:1}50%{opacity:.55}}
.vb-cd-label{font-size:.66rem;color:#aaa;margin-bottom:2px}
.vb-urgent-badge{font-size:.7rem;background:var(--rd);color:#fff;border-radius:999px;padding:4px 10px;font-weight:800}
.my-box{background:var(--sf);border:1px solid var(--bd2);border-radius:var(--r);padding:14px;margin-bottom:10px}
.my-btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.my-btn{padding:18px 8px;border-radius:var(--r2);font-size:.92rem;font-weight:700;border:1.5px solid var(--bd2);cursor:pointer;background:var(--sf2);color:#999;font-family:inherit;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:4px}
.my-btn .bi{font-size:1.5rem}
.my-btn.at-on{background:linear-gradient(135deg,#0d2a14,#091a0f);border-color:var(--gn);color:var(--gn)}
.my-btn.ab-on{background:linear-gradient(135deg,#2a0d0d,#1a0909);border-color:var(--rd);color:var(--rd)}
.my-btn:disabled{opacity:.3;cursor:not-allowed}
.save-btn{width:100%;padding:13px;background:var(--ac);border:none;border-radius:9px;color:#000;font-size:.92rem;font-weight:800;cursor:pointer;font-family:inherit}
.save-btn:disabled{opacity:.3;cursor:not-allowed}
.rl-ttl{font-size:.7rem;font-weight:700;color:#bbb;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center}
.rr{display:flex;align-items:center;padding:10px 13px;background:var(--sf);border:1px solid var(--bd2);border-radius:var(--r2);margin-bottom:4px}
.rr.me{border-color:rgba(163,230,53,.3);background:rgba(163,230,53,.05)}
.rr-name{font-weight:700;font-size:.86rem;flex:1;display:flex;align-items:center;gap:5px;flex-wrap:wrap;min-width:0}
.rr-right{display:flex;align-items:center;gap:5px;flex-shrink:0}
.rbadge{font-size:.64rem;padding:3px 9px;border-radius:999px;font-weight:700;min-width:42px;text-align:center}
.rb-at{background:var(--gnbg);color:var(--gn)}.rb-ab{background:var(--rdbg);color:var(--rd)}.rb-nr{background:var(--sf2);color:#888}
/* FEE */
.fee-hero{background:linear-gradient(135deg,#0d1a0e,#0b1218);border:1px solid rgba(163,230,53,.18);border-radius:var(--r);padding:22px;text-align:center;margin-bottom:9px}
.fa{font-size:2.8rem;font-weight:900;letter-spacing:-.04em;color:var(--ac);line-height:1}
.fu{font-size:1rem;font-weight:400}
.fsub{color:#aaa;font-size:.74rem;margin-top:5px}
.fbreak{border-top:1px solid var(--bd2);margin-top:11px;padding-top:11px;display:flex;flex-direction:column;gap:6px}
.frow{display:flex;justify-content:space-between;font-size:.78rem;color:#bbb}
.frow.tot{color:#fff;font-weight:700;border-top:1px solid var(--bd2);padding-top:6px;margin-top:2px}
.acc-card{background:var(--sf);border:1px solid var(--bd2);border-radius:var(--r);padding:13px 15px;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between}
.acc-info p:first-child{font-size:.64rem;color:#888;margin-bottom:2px}
.acc-info p:last-child{font-size:.9rem;font-weight:700}
.cpbtn{padding:7px 11px;background:var(--sf2);border:1px solid var(--bd2);border-radius:7px;color:#bbb;font-size:.72rem;cursor:pointer;font-family:inherit}
.cpbtn:hover{color:var(--ac)}
.my-pay-card{background:var(--sf);border:1px solid var(--bd2);border-radius:var(--r);padding:14px;margin-bottom:9px}
.mp-status{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.mp-label{font-size:.84rem;font-weight:700}
.mp-state{font-size:.76rem;padding:4px 12px;border-radius:999px;font-weight:700}
.mp-wait{background:var(--ambg);color:var(--am)}.mp-self{background:var(--blbg);color:var(--bl)}.mp-done{background:var(--gnbg);color:var(--gn)}
.pay-row{background:var(--sf);border:1px solid var(--bd2);border-radius:var(--r2);padding:10px 13px;margin-bottom:5px}
.pr-top{display:flex;align-items:center;justify-content:space-between;gap:6px}
.pr-name{font-weight:700;font-size:.84rem;flex:1;min-width:0}
.pr-acts{display:flex;gap:4px;align-items:center;flex-shrink:0}
.cfbtn{padding:5px 10px;border-radius:7px;font-size:.7rem;font-weight:700;border:1px solid rgba(52,211,153,.3);cursor:pointer;background:var(--gnbg);color:var(--gn);font-family:inherit;white-space:nowrap}
.cfbtn.ok{background:var(--gn);color:#000;border-color:var(--gn)}
.sbtn{padding:5px 10px;border-radius:7px;font-size:.7rem;font-weight:700;border:1px solid var(--bd2);cursor:pointer;background:transparent;color:#999;font-family:inherit;white-space:nowrap}
.sbtn.done{border-color:rgba(96,165,250,.4);color:var(--bl);background:var(--blbg)}
/* TEAMS */
.tmode-row{display:flex;gap:6px;margin-bottom:10px}
.tmode-btn{flex:1;padding:11px;border-radius:var(--r2);font-size:.82rem;font-weight:700;border:1.5px solid var(--bd2);cursor:pointer;background:var(--sf2);color:#aaa;font-family:inherit}
.tmode-btn.on{border-color:var(--ac);background:var(--acbg);color:var(--ac)}
.tgrid{gap:6px;margin-bottom:7px;display:grid}
.tg2{grid-template-columns:1fr 1fr}.tg3{grid-template-columns:1fr 1fr 1fr}
.tcol{background:var(--sf);border-radius:var(--r);padding:11px}
.tcol.bl{border:1px solid rgba(96,165,250,.3)}.tcol.rd{border:1px solid rgba(248,113,113,.3)}.tcol.gn2{border:1px solid rgba(52,211,153,.3)}
.tcol-t{font-size:.72rem;font-weight:800;margin-bottom:8px}
.tcol.bl .tcol-t{color:var(--bl)}.tcol.rd .tcol-t{color:var(--rd)}.tcol.gn2 .tcol-t{color:var(--gn)}
.tpl{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bd);font-size:.78rem;color:#ddd}
.tpl:last-child{border-bottom:none}
.mvbtn{background:transparent;border:1px solid var(--bd2);border-radius:4px;color:#888;cursor:pointer;font-size:.58rem;padding:2px 5px;font-family:inherit}
.mvbtn:hover{color:var(--am)}
.pool-pl{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;background:var(--sf);border:1px solid var(--bd2);border-radius:8px;margin-bottom:4px}
.pool-moves{display:flex;gap:3px}
.pmvbtn{padding:4px 8px;border-radius:5px;font-size:.66rem;font-weight:600;border:none;cursor:pointer;font-family:inherit}
.pmv-a{background:rgba(96,165,250,.15);color:var(--bl)}.pmv-b{background:rgba(248,113,113,.15);color:var(--rd)}.pmv-c{background:rgba(52,211,153,.15);color:var(--gn)}
/* ADMIN 4탭 */
.admin-tabs{display:flex;margin-bottom:12px;background:var(--sf2);border-radius:var(--r2);border:1px solid var(--bd2);overflow:hidden}
.atab{flex:1;padding:9px 2px;background:transparent;border:none;color:#888;font-size:.62rem;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;line-height:1.4}
.atab.on{background:var(--sf3);color:var(--ac);font-weight:800}
.atab:not(:last-child){border-right:1px solid var(--bd2)}
.atab .atic{font-size:.85rem;display:block;margin-bottom:2px}
.aw{background:rgba(163,230,53,.06);border:1px solid rgba(163,230,53,.15);border-radius:9px;padding:9px 13px;margin-bottom:11px;font-size:.78rem;color:var(--ac);font-weight:600}
.admin-game-view{background:linear-gradient(135deg,#0d1a0e,#0b1218);border:1px solid rgba(163,230,53,.2);border-radius:var(--r);padding:15px;margin-bottom:9px}
.agv-venue{font-size:1.05rem;font-weight:900;margin-bottom:10px}
.agv-row{display:flex;justify-content:space-between;font-size:.78rem;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.agv-row:last-of-type{border-bottom:none}
.agv-key{color:#888;flex-shrink:0;margin-right:8px}
.agv-val{color:#fff;font-weight:600;text-align:right;word-break:break-all}
.agv-act-row{display:flex;gap:7px;margin-top:12px}
.agv-edit-btn{flex:1;padding:10px;background:transparent;border:1.5px solid rgba(163,230,53,.3);border-radius:9px;color:var(--ac);font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit}
.agv-set-btn{flex:1;padding:10px;background:var(--ac);border:none;border-radius:9px;color:#000;font-size:.82rem;font-weight:800;cursor:pointer;font-family:inherit}
.agv-active{flex:1;padding:10px;background:var(--gnbg);border:1px solid rgba(52,211,153,.3);border-radius:9px;color:var(--gn);font-size:.82rem;font-weight:700;cursor:default;font-family:inherit;text-align:center}
/* RT rows */
.rt-row{display:flex;align-items:center;padding:9px 12px;background:var(--sf2);border:1px solid var(--bd2);border-radius:var(--r2);margin-bottom:4px;gap:6px}
.rt-info{flex:1;min-width:0}
.rt-name{font-weight:700;font-size:.82rem;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.rt-btns{display:flex;gap:3px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.rt-btn{padding:5px 8px;border-radius:7px;font-size:.68rem;font-weight:700;border:1.5px solid var(--bd2);cursor:pointer;background:transparent;color:#888;font-family:inherit;transition:all .15s;white-space:nowrap}
.rt-btn.att-on{border-color:var(--gn);background:var(--gnbg);color:var(--gn)}
.rt-btn.abs-on{border-color:var(--rd);background:var(--rdbg);color:var(--rd)}
.rt-btn.del{border-color:rgba(248,113,113,.3);color:var(--rd)}
.rt-btn.pay-ok{border-color:var(--gn);background:var(--gn);color:#000}
.rt-btn.pay-self{border-color:var(--bl);background:var(--blbg);color:var(--bl)}
.guest-tag{font-size:.6rem;padding:2px 6px;border-radius:999px;font-weight:700;background:var(--ambg);color:var(--am);border:1px solid rgba(251,191,36,.2)}
.car-list-row{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;background:var(--sf2);border:1px solid var(--bd2);border-radius:8px;margin-bottom:4px}
.car-list-name{font-size:.82rem;font-weight:600}
.car-list-num{font-size:.86rem;color:var(--ac);font-weight:800}
/* 멤버 관리 */
.rm-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--sf2);border:1px solid var(--bd2);border-radius:8px;margin-bottom:4px}
.rm-row-name{font-weight:600;font-size:.84rem;display:flex;align-items:center;gap:6px;flex:1}
.rm-gender{font-size:.64rem;padding:2px 6px;border-radius:999px;font-weight:700}
.rm-m{background:var(--blbg);color:var(--bl)}.rm-f{background:var(--rdbg);color:var(--rd)}
.delbtn{background:transparent;border:1px solid var(--bd2);border-radius:5px;color:#888;cursor:pointer;font-size:.7rem;padding:4px 9px;font-family:inherit;flex-shrink:0;white-space:nowrap}
.delbtn:hover{color:var(--rd);border-color:var(--rd)}
.addrow{display:flex;gap:6px;margin-bottom:8px}
.addrow .fi{flex:1}
.addbtn{padding:11px 13px;background:var(--ac);border:none;border-radius:8px;color:#000;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.gender-row{display:flex;gap:5px;margin-bottom:9px}
.gbtn{flex:1;padding:9px;border-radius:8px;font-size:.8rem;font-weight:700;border:1.5px solid var(--bd2);cursor:pointer;background:transparent;color:#888;font-family:inherit;transition:all .15s}
.gbtn.m-on{border-color:var(--bl);background:var(--blbg);color:var(--bl)}
.gbtn.f-on{border-color:var(--rd);background:var(--rdbg);color:var(--rd)}
/* dt picker */
.dtp-row{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.dtp-sel{background:var(--sf3);border:1px solid var(--bd2);border-radius:6px;padding:7px 5px;color:#fff;font-family:inherit;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;text-align:center}
.dtp-sel:focus{border-color:var(--ac)}
.dtp-sep{color:#888;font-weight:700}
.dt-picker{background:var(--sf2);border:1.5px solid var(--bd2);border-radius:9px;padding:11px 13px}
/* hist modal */
.hist-modal{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;z-index:300}
.hist-sheet{background:var(--sf);border-radius:20px 20px 0 0;padding:16px 18px 36px;width:100%;max-width:430px;max-height:80vh;overflow-y:auto}
.hist-handle{width:30px;height:3px;background:var(--bd2);border-radius:999px;margin:0 auto 14px}
.hist-title{font-size:.92rem;font-weight:800;margin-bottom:4px}
.hist-sub{font-size:.72rem;color:#888;margin-bottom:12px}
.hist-item{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;background:var(--sf2);border:1px solid var(--bd2);border-radius:9px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.hist-item:hover{border-color:rgba(163,230,53,.4);background:var(--acbg)}
.hist-item:active{transform:scale(.98)}
.hist-item-info p:first-child{font-size:.86rem;font-weight:700}
.hist-item-info p:last-child{font-size:.66rem;color:#aaa;margin-top:2px}
.hist-close{width:100%;padding:12px;background:transparent;border:1.5px solid var(--bd2);border-radius:9px;color:#aaa;font-size:.86rem;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(10px);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding:0}
.msheet{background:var(--sf);border-radius:18px 18px 0 0;padding:18px 20px 36px;width:100%;max-width:430px;box-shadow:0 -20px 60px rgba(0,0,0,.6)}
.mhandle{width:30px;height:3px;background:var(--bd2);border-radius:999px;margin:0 auto 14px}
.msheet h2{font-size:.94rem;font-weight:800;margin-bottom:12px}
.mbtn{width:100%;border:none;border-radius:9px;padding:12px;font-weight:700;font-size:.88rem;cursor:pointer;font-family:inherit;margin-top:6px}
.mbtn.ac{background:var(--ac);color:#000}.mbtn.gh2{background:transparent;color:#aaa;border:1.5px solid var(--bd2)}
.merr{color:var(--rd);font-size:.74rem;margin-top:3px;display:none}
#toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--sf2);border:1px solid var(--bd2);border-radius:999px;padding:8px 18px;font-size:.78rem;font-weight:600;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:400}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#sync-ind{position:fixed;top:52px;right:6px;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.22);border-radius:999px;padding:3px 10px;font-size:.64rem;color:var(--gn);z-index:200;opacity:0;transition:all .3s;pointer-events:none}
#sync-ind.show{opacity:1}
</style>
</head>
<body>
<div id="sl" class="screen on">
  <div class="lg-hero"><h1 class="lg-title">Aion<em>FS</em></h1><p class="lg-sub">매주 정기 풋살</p></div>
  <div class="lg-body">
    <div id="rm-sec"></div>
    <p class="lg-sect" id="ls-lbl" style="display:none">이름으로 검색</p>
    <div class="srch-wrap" id="srch-wrap" style="display:none">
      <input class="srch-inp" id="srch" type="text" placeholder="이름 입력..." oninput="onSrch(this.value)" autocomplete="off" autocorrect="off" autocapitalize="off">
      <span class="srch-ic">🔍</span>
    </div>
    <div class="srch-list" id="srch-list"></div>
    <button class="admin-big-btn" onclick="openModal()">⚙️ &nbsp;관리자 로그인</button>
  </div>
</div>
<div id="sm" class="screen">
  <div class="hdr">
    <div class="hdr-l"><h1>⚽ Aion<em>FS</em></h1><small id="hsub">매주 정기 풋살</small></div>
    <div class="hdr-r">
      <span class="sdot" id="sdot"></span>
      <button class="hbtn" onclick="doRefresh()">↺</button>
      <div class="me-pill" id="mbadge">-</div>
      <button class="hbtn" id="abtn" onclick="openModal()" style="display:none">⚙</button>
      <button class="hbtn" id="logout-btn" onclick="doLogout()" style="display:none;color:var(--rd);border-color:rgba(248,113,113,.4)">로그아웃</button>
    </div>
  </div>
  <div class="content">
    <div id="tab-home" class="tab on"></div>
    <div id="tab-att" class="tab"></div>
    <div id="tab-fee" class="tab"></div>
    <div id="tab-teams" class="tab"></div>
    <div id="tab-admin" class="tab"></div>
  </div>
  <div class="bnav" id="bnav"></div>
</div>
<div id="confirm-ov" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(10px);z-index:500;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--sf);border-radius:16px;padding:24px 20px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.6)">
    <p id="confirm-msg" style="font-size:.92rem;color:#fff;font-weight:600;margin-bottom:20px;line-height:1.7;text-align:center;white-space:pre-line"></p>
    <div style="display:flex;gap:9px">
      <button onclick="confirmResolve(false)" style="flex:1;padding:13px;background:transparent;border:1.5px solid var(--bd2);border-radius:9px;color:#aaa;font-size:.88rem;font-weight:700;cursor:pointer;font-family:inherit">취소</button>
      <button id="confirm-ok-btn" onclick="confirmResolve(true)" style="flex:1;padding:13px;background:var(--rd);border:none;border-radius:9px;color:#fff;font-size:.88rem;font-weight:700;cursor:pointer;font-family:inherit">삭제</button>
    </div>
  </div>
</div>
<div id="ov" class="overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="msheet">
    <div class="mhandle"></div>
    <h2>⚙️ 관리자 로그인</h2>
    <input class="fi" type="password" id="pwi" placeholder="비밀번호 입력" autocomplete="current-password" onkeydown="if(event.key==='Enter')tryLogin()">
    <p class="merr" id="pwe">비밀번호가 틀렸습니다</p>
    <button class="mbtn ac" onclick="tryLogin()" style="margin-top:10px">로그인</button>
    <button class="mbtn gh2" onclick="closeModal()">취소</button>
  </div>
</div>
<div id="hist-modal" class="hist-modal" style="display:none" onclick="if(event.target===this)closeHist()">
  <div class="hist-sheet">
    <div class="hist-handle"></div>
    <div class="hist-title">이전 경기 불러오기</div>
    <div class="hist-sub">구장명·시간·주소·비용 불러옴. 날짜는 캘린더 선택 날짜로 고정.</div>
    <div id="hist-list"></div>
    <button class="hist-close" onclick="closeHist()">닫기</button>
  </div>
</div>
<div id="toast"></div><div id="sync-ind">↻ 업데이트됨</div>
<script>
// ─── STORAGE ───
var HWS=typeof window!=='undefined'&&!!window.storage;
function lg(k){try{var v=localStorage.getItem('afs3_'+k);return v?JSON.parse(v):null}catch(e){return null}}
function ls(k,v){try{localStorage.setItem('afs3_'+k,JSON.stringify(v))}catch(e){}}
async function sg(k){if(!HWS)return lg(k);try{var r=await window.storage.get('afs3_'+k,true);return r?JSON.parse(r.value):lg(k)}catch(e){return lg(k)}}
async function ss(k,v){ls(k,v);if(!HWS)return;try{await window.storage.set('afs3_'+k,JSON.stringify(v),true)}catch(e){}}
// ─── STATE ───
var S={
  isAdmin:false,myId:null,tab:'home',adminTab:0,editingGame:false,forceNewForm:false,adminDate:null,
  activeDate:'',selGender:'',
  regularMembers:[],allGames:{},gameHistory:[],allGM:{},
  allVotes:{},allPayments:{},allTeams:{},allDeadlines:{},allFinalised:{},allTeamPublished:{},
  teamMode:2,settings:{account:'',accountName:'',adminPw:'1234'},
};
// ─── DATE ───
function pad(n){return String(n).padStart(2,'0')}
function dk(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function getThisThursday(){
  var now=new Date(),dow=now.getDay();
  var thu=new Date(now);thu.setDate(now.getDate()+(dow===0?4:dow<=4?4-dow:4+(7-dow)));
  thu.setHours(0,0,0,0);return thu;
}
function adk(){return dk(S.adminDate)}
function actDk(){return S.activeDate||dk(getThisThursday())}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
var DAYS=['일','월','화','수','목','금','토'];
var TIMES=['18:00-20:00','18:30-20:30','19:00-21:00','19:30-21:30','20:00-22:00','20:30-22:30','21:00-23:00'];
// ─── MEMBER HELPERS ───
// 정규멤버 + 해당날짜 용병 합쳐서 리턴
function getGM(dkey){
  var excluded=S.allGM[dkey]?S.allGM[dkey].filter(function(m){return m.isExcluded}).map(function(m){return String(m.id);}):[];
  var base=S.regularMembers.filter(function(m){return excluded.indexOf(String(m.id))<0;});
  var extra=S.allGM[dkey]?S.allGM[dkey].filter(function(m){return m.isGuest&&!m.isExcluded}):[];
  return base.concat(extra);
}
// 정규멤버만 (이름 최신으로)
function actGM(){return getGM(actDk())}
function adminGM(){return getGM(adk())}
function actVotes(){return S.allVotes[actDk()]||{}}
function adminVotes(){return S.allVotes[adk()]||{}}
function actGame(){return S.allGames[actDk()]||null}
function adminGame(){return S.allGames[adk()]||null}
function actPay(){return S.allPayments[actDk()]||{}}
function adminPay(){return S.allPayments[adk()]||{}}
function actDl(){return S.allDeadlines[actDk()]||null}
function adminDl(){return S.allDeadlines[adk()]||null}
function actTeams(){return S.allTeams[actDk()]||null}
function actFinalised(){return !!(S.allFinalised&&S.allFinalised[actDk()])}
function adminFinalised(){return !!(S.allFinalised&&S.allFinalised[adk()])}
// 정렬: 참석→불참→미응답, 같은 그룹 내 ㄱㄴㄷ
function sortGM(gm,votes){
  return gm.slice().sort(function(a,b){
    var o={attend:0,absent:1};
    var oa=o[(votes[a.id]||{}).status]!=null?o[(votes[a.id]||{}).status]:2;
    var ob=o[(votes[b.id]||{}).status]!=null?o[(votes[b.id]||{}).status]:2;
    if(oa!==ob)return oa-ob;
    return a.name.localeCompare(b.name,'ko');
  });
}
// ─── LOAD ───
var lastPoll='',pollTmr=null,cdTmr=null;
async function loadAll(){
  var r=await Promise.all([sg('rm'),sg('games'),sg('gh'),sg('gm'),sg('v'),sg('p'),sg('t'),sg('dl'),sg('s'),sg('tm'),sg('ad'),sg('fc'),sg('tp')]);
  S.regularMembers=r[0]||[];S.allGames=r[1]||{};S.gameHistory=r[2]||[];
  S.allGM=r[3]||{};S.allVotes=r[4]||{};S.allPayments=r[5]||{};
  S.allTeams=r[6]||{};S.allDeadlines=r[7]||{};
  S.settings=Object.assign({account:'',accountName:'',adminPw:'1234'},r[8]||{});
  S.teamMode=r[9]||2;S.activeDate=r[10]||'';S.allFinalised=r[11]||{};S.allTeamPublished=r[12]||{};
  if(!S.adminDate)S.adminDate=getThisThursday();
}
function startPoll(){
  if(pollTmr)return;
  pollTmr=setInterval(async function(){
    try{
      var r=await Promise.all([sg('rm'),sg('games'),sg('gm'),sg('v'),sg('p'),sg('dl'),sg('ad'),sg('fc'),sg('tp')]);
      var nd=JSON.stringify(r);
      if(nd!==lastPoll&&lastPoll!==''){
        S.regularMembers=r[0]||[];S.allGames=r[1]||{};S.allGM=r[2]||{};
        S.allVotes=r[3]||{};S.allPayments=r[4]||{};S.allDeadlines=r[5]||{};
        S.activeDate=r[6]||'';S.allFinalised=r[7]||{};S.allTeamPublished=r[8]||{};
        showSync();
        var sd=document.getElementById('sdot');if(sd){sd.classList.add('on');setTimeout(function(){sd.classList.remove('on')},3000)}
        if(document.getElementById('sm').classList.contains('on')){renderAll();renderLogin();}
      }
      lastPoll=nd;
    }catch(e){}
  },8000);
}
function startCd(){
  if(cdTmr)clearInterval(cdTmr);
  cdTmr=setInterval(function(){
    var el=document.getElementById('vb-cd-num');if(!el)return;
    var st=getVoteSt();var dl=actDl();
    var iso=st==='open'?dl&&dl.end:st==='pending'?dl&&dl.start:null;
    if(!iso){el.textContent='';return;}
    var ms=new Date(iso)-new Date();
    el.textContent=fmtCd(ms);
    var urgent=ms>0&&ms<12*3600000;
    el.className='vb-cd '+(urgent?'urgent':'normal');
    var ub=document.getElementById('vb-urgent');if(ub)ub.style.display=urgent?'':'none';
  },1000);
}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show')},2400)}
function showSync(){var el=document.getElementById('sync-ind');el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show')},2000)}
function getVoteSt(){
  var dl=actDl();
  // 투표기간 미설정이면 투표 불가 (상시오픈 없음)
  if(!dl||(!dl.start&&!dl.end))return'none';
  var now=new Date(),s=dl.start?new Date(dl.start):null,e=dl.end?new Date(dl.end):null;
  if(s&&now<s)return'pending';
  if(e&&now>e)return'closed';
  return'open';
}
function isOpen(){return getVoteSt()==='open';}
function fmtDt(iso){if(!iso)return'';var d=new Date(iso);var ap=d.getHours()<12?'AM':'PM';var h=d.getHours()%12||12;var dow=['일','월','화','수','목','금','토'][d.getDay()];return(d.getMonth()+1)+'/'+(d.getDate())+'('+dow+') '+ap+' '+pad(h)+':'+pad(d.getMinutes())}
function fmtCd(ms){if(ms<=0)return'마감';var h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);return pad(h)+':'+pad(m)+':'+pad(s)}
// ─── LOGIN ───
function renderLogin(){
  var rmId=lg('myId');var rmSec=document.getElementById('rm-sec');
  if(rmId){
    var me=S.regularMembers.find(function(m){return m.id===rmId});
    if(me){
      rmSec.innerHTML='<div class="rm-card"><div class="rm-av">'+esc(me.name.charAt(0))+'</div>'+
        '<div class="rm-info"><p>'+esc(me.name)+'</p><p>지난번 선택</p></div>'+
        '<button class="rm-btn" onclick="selMember('+me.id+')">입장 →</button></div>';
    } else rmSec.innerHTML='';
  } else rmSec.innerHTML='';
  var has=S.regularMembers.length>0;
  document.getElementById('ls-lbl').style.display=has?'':'none';
  document.getElementById('srch-wrap').style.display=has?'':'none';
  if(!has)document.getElementById('srch-list').classList.remove('show');
}
function onSrch(q){
  var list=document.getElementById('srch-list');
  if(!q||!q.trim()){list.classList.remove('show');return;}
  var f=S.regularMembers.filter(function(m){return m.name.includes(q.trim())}).sort(function(a,b){return a.name.localeCompare(b.name,'ko')});
  if(!f.length){list.innerHTML='<div style="padding:14px;color:#888;font-size:.84rem;text-align:center">검색 결과 없음</div>';list.classList.add('show');return;}
  list.innerHTML=f.map(function(m){
    return'<div class="si" onclick="selMember('+m.id+')"><div class="si-av">'+esc(m.name.charAt(0))+'</div><span class="si-name">'+esc(m.name)+'</span></div>';
  }).join('');
  list.classList.add('show');
}
function selMember(id){
  S.myId=id;ls('myId',id);
  document.getElementById('srch-list').classList.remove('show');
  var el=document.getElementById('srch');if(el)el.value='';
  showMain();
}
// ─── MAIN ───
function showMain(){
  document.getElementById('sl').classList.remove('on');
  document.getElementById('sm').classList.add('on');
  updateHdr();renderBnav();renderAll();startPoll();startCd();
}
function updateHdr(){
  var me=S.regularMembers.find(function(m){return m.id===S.myId});

function renderBnav(){
  var tabs=[{id:'home',ic:'🏠',l:'홈'},{id:'att',ic:'📋',l:'참석'},{id:'fee',ic:'💰',l:'회비'},{id:'teams',ic:'👥',l:'팀편성'}];
  if(S.isAdmin)tabs.push({id:'admin',ic:'⚙️',l:'Admin'});
  document.getElementById('bnav').innerHTML=tabs.map(function(t){
    return'<button class="nb'+(S.tab===t.id?' on':'')+'" onclick="swTab(\''+t.id+'\')"><span class="nb-ic">'+t.ic+'</span>'+t.l+'</button>';

function swTab(id){
  document.querySelectorAll('.tab').forEach(function(el){el.classList.remove('on')});
  document.getElementById('tab-'+id).classList.add('on');
  S.tab=id;renderBnav();renderTab(id);
}

function wkDates(base){
  var d=base.getDay(),mon=new Date(base);mon.setDate(base.getDate()-(d===0?6:d-1));
  var out=[];for(var i=0;i<7;i++){var x=new Date(mon);x.setDate(mon.getDate()+i);out.push(x);}return out;
}

var _dst=null;
function selSt(st){
  // 같은 버튼 두 번 누르면 해제
  if(_dst===st){
    _dst=null;
    document.querySelectorAll('.my-btn').forEach(function(b){b.classList.remove('at-on','ab-on')});
    var box=document.querySelector('.my-box');
    if(box){var ex=box.querySelector('.fg');if(ex)ex.remove();}
    return;
  }
  _dst=st;
  document.querySelectorAll('.my-btn').forEach(function(b){b.classList.remove('at-on','ab-on')});
  var btns=document.querySelectorAll('.my-btn');
  if(btns[st==='attend'?0:1])btns[st==='attend'?0:1].classList.add(st==='attend'?'at-on':'ab-on');
  var box=document.querySelector('.my-box');if(!box)return;
  var brow=box.querySelector('.brow');
  var ex=box.querySelector('.fg');
  if(st==='attend'&&!ex){
    var d=document.createElement('div');d.className='fg';
    d.innerHTML='<div class="fl">🚗 차량번호 (선택)</div><input class="fi" id="car-inp" placeholder="예: 12가3456" autocomplete="off">';
    if(brow){box.insertBefore(d,brow);}else{box.appendChild(d);}
  } else if(st==='absent'&&ex){ex.remove();}
}
async function saveVote(){
  if(!S.myId){toast('이름을 먼저 선택해주세요');return;}
  var st=_dst||((actVotes()[S.myId]||{}).status)||'';
  if(!st){toast('참석 또는 불참을 선택해주세요');return;}
  var ci=document.getElementById('car-inp');var car=ci?ci.value.trim():'';
  var dkey=actDk();
  if(!S.allVotes[dkey])S.allVotes[dkey]={};
  if(!S.allVotes[dkey][S.myId])S.allVotes[dkey][S.myId]={};
  S.allVotes[dkey][S.myId].status=st;S.allVotes[dkey][S.myId].car=car;
  await ss('v',S.allVotes);_dst=null;toast('저장됐어요 ✓');renderAtt();renderHome();
}
async function cancelVote(){
  if(!S.myId)return;
  var dkey=actDk();
  if(S.allVotes[dkey])delete S.allVotes[dkey][S.myId];
  await ss('v',S.allVotes);_dst=null;toast('저장 취소됐습니다');renderAtt();renderHome();
}

  }

function renderTeams(){

  var nm=S.teamMode;

  // 개인: 마감 확정 + 팀 공개 된 경우만 팀 보여줌

    if(!finalised){
      document.getElementById('tab-teams').innerHTML=
        '<div style="background:var(--sf);border:1px dashed var(--bd2);border-radius:var(--r);padding:2.5rem 1rem;text-align:center">'+

        '<div style="font-size:2rem;margin-bottom:8px">⚽</div>'+
        '<p style="color:#aaa;font-size:.84rem">관리자가 팀 편성 중입니다</p></div>';

    var clsCols=['bl','rd','gn2'],ics=['🔵','🔴','🟢'],tmNms=['A팀','B팀','C팀'];

    document.getElementById('tab-teams').innerHTML=thtml;

async function genTeams(){

  var a=gm.filter(function(m){return(av[m.id]||{}).status==='attend';});
  if(a.length<S.teamMode){toast('최소 '+S.teamMode+'명 이상 참석해야 합니다');return;}
  var sh=[].concat(a).sort(function(){return Math.random()-.5});
  var td={gen:new Date().toLocaleString('ko-KR'),A:[],B:[],C:[]};
  sh.forEach(function(m,i){td['ABC'[i%S.teamMode]].push(m);});
  var dkey=actDk();S.allTeams[dkey]=td;
  await ss('t',S.allTeams);renderTeams();toast('팀 편성 완료!');
}
async function mvPl(id,from,to){
  var dkey=actDk();var teams=S.allTeams[dkey];if(!teams)return;
  var gt=function(t){return t==='A'?teams.A:t==='B'?teams.B:(teams.C||[]);};
  var st2=function(t,v){if(t==='A')teams.A=v;else if(t==='B')teams.B=v;else teams.C=v;};
  var ft=gt(from),pl=ft.find(function(m){return m.id===id;});if(!pl)return;
  st2(from,ft.filter(function(m){return m.id!==id;}));
  var tt=gt(to);tt.push(pl);st2(to,tt);
  await ss('t',S.allTeams);renderTeams();
}
async function setTeamPublished(val){

}

async function adminVote(memberId,status){
  var dkey=adk();
  if(!S.allVotes[dkey])S.allVotes[dkey]={};
  // 키: 숫자 우선, 없으면 문자열
  var key=memberId;
  if(S.allVotes[dkey][memberId]===undefined&&S.allVotes[dkey][String(memberId)]!==undefined){
    key=String(memberId);
  }
  var cur=(S.allVotes[dkey][key]||{}).status||'';
  // 같은 버튼 두 번 누르면 해제
  if(cur===status){
    delete S.allVotes[dkey][key];
  } else {
    if(!S.allVotes[dkey][key])S.allVotes[dkey][key]={};
    S.allVotes[dkey][key].status=status;
  }
  await ss('v',S.allVotes);
  renderAdmin();
  if(dkey===actDk()){renderAtt();renderFee();renderHome();}
}
async function deleteVote(memberId){
  var dkey=adk();
  // 투표 삭제
  if(S.allVotes[dkey]){
    delete S.allVotes[dkey][memberId];
    delete S.allVotes[dkey][String(memberId)];
    delete S.allVotes[dkey][Number(memberId)];
  }
  // 이번 날짜 경기에서 제외 표시 (정규멤버를 현황에서 숨김)
  if(!S.allGM[dkey])S.allGM[dkey]=[];
  var alreadyEx=S.allGM[dkey].find(function(m){return String(m.id)===String(memberId)&&m.isExcluded;});
  if(!alreadyEx){
    S.allGM[dkey].push({id:Number(memberId),isExcluded:true});
  }
  await ss('v',S.allVotes);await ss('gm',S.allGM);
  renderAdmin();
  if(dkey===actDk()){renderAtt();renderHome();}
  toast('이번 경기에서 제외됐습니다');
}
async function setFinalised(val){
  if(val){
    // 투표 종료일 전이면 마감 불가
    var dl=S.allDeadlines[adk()]||null;
    if(dl&&dl.end){
      var now=new Date();var endT=new Date(dl.end);
      if(now<endT){
        var diff=endT-now;
        var h=Math.floor(diff/3600000),m2=Math.floor((diff%3600000)/60000);
        toast('⚠ 투표 중입니다! 종료까지 '+h+'시간 '+m2+'분 남았습니다. 마감이 불가합니다.');
        return;
      }
    }
  }
  if(!S.allFinalised)S.allFinalised={};
  var dkey=adk();
  if(val)S.allFinalised[dkey]=true;
  else delete S.allFinalised[dkey];
  await ss('fc',S.allFinalised);
  toast(val?'마감 확정됐습니다!':'마감 취소됐습니다');
  renderAdmin();
  if(dkey===actDk()){renderFee();renderTeams();}
}
async function tglConfAdmin(id){
  var dkey=adk();
  if(!S.allPayments[dkey])S.allPayments[dkey]={};
  if(!S.allPayments[dkey][id])S.allPayments[dkey][id]={};

function openHistModal(){

  // 중복 제거: 같은 venue+address는 가장 최신 것만 표시
  var seen={};var deduped=S.gameHistory.slice().reverse().filter(function(gh){

      '<div class="hist-item-info">'+
      '<p>'+esc(gh.venue||'구장명 없음')+'</p>'+

async function saveGame(){
  function gv(id){var el=document.getElementById(id);return el?el.value.trim():'';}
  var venue=gv('g-v');if(!venue){toast('구장명을 입력해주세요');return;}
  var tEl=document.getElementById('g-t');
  var isEdit=S.editingGame&&!S.forceNewForm&&adminGame();var dkey=adk();
  var newG={venue:venue,dayOfWeek:S.adminDate.getDay(),time:tEl?tEl.value:'',
    address:gv('g-a'),mapUrl:gv('g-m'),venueFee:Number(gv('g-vf'))||0,drinkFee:Number(gv('g-df'))||0,notes:gv('g-n')};
  S.allGames[dkey]=newG;
  // 신규/수정 관계없이 gameHistory 에 항상 최신 데이터 반영
  var existIdx=S.gameHistory.findIndex(function(h){
    // 같은 날짜에 등록된 이력 찾기 (venue+address 조합)
    return h.venue===newG.venue&&h.address===newG.address;
  });
  if(existIdx>=0){
    // 기존 이력 업데이트
    S.gameHistory[existIdx]=Object.assign({},S.gameHistory[existIdx],newG,{savedAt:new Date().toISOString()});
  } else {
    // 새 이력 추가
    S.gameHistory.push(Object.assign({},newG,{id:Date.now(),savedAt:new Date().toISOString()}));
    if(S.gameHistory.length>30)S.gameHistory=S.gameHistory.slice(-30);
  }
  await ss('gh',S.gameHistory);
  if(!isEdit){
    if(!S.activeDate){S.activeDate=dkey;await ss('ad',S.activeDate);}
    delete S.allVotes[dkey];delete S.allTeams[dkey];delete S.allPayments[dkey];
    await ss('v',S.allVotes);await ss('t',S.allTeams);await ss('p',S.allPayments);
  }
  await ss('games',S.allGames);
  S.editingGame=false;S.forceNewForm=false;toast(isEdit?'경기 수정됨!':'경기 등록됨!');updateHdr();renderAll();
}

  S.allDeadlines[dkey]=newDl;
  // 투표기간이 바뀌면 해당 날짜 데이터 전부 리셋
  if(changed){
    delete S.allVotes[dkey];
    delete S.allFinalised[dkey];
    delete S.allTeams[dkey];
    delete S.allPayments[dkey];
    delete S.allTeamPublished[dkey];
    await ss('v',S.allVotes);
    await ss('fc',S.allFinalised);
    await ss('t',S.allTeams);
    await ss('p',S.allPayments);
    await ss('tp',S.allTeamPublished);
    toast('투표 기간 저장됨! 관련 데이터가 초기화됐습니다.');
  } else {
    toast('투표 기간 저장됨!');
  }
  await ss('dl',S.allDeadlines);
  if(dkey===actDk())renderAll();
  else renderAdmin();
}
async function clrDl(){
  var dkey=adk();

  var today=new Date();today.setHours(0,0,0,0);
  var todayIso=today.toISOString();
  S.allDeadlines[dkey]={start:todayIso,end:todayIso};
  // 마감/팀/회비 데이터도 초기화
  delete S.allVotes[dkey];
  delete S.allFinalised[dkey];
  delete S.allTeams[dkey];
  delete S.allPayments[dkey];
  delete S.allTeamPublished[dkey];
  await Promise.all([ss('dl',S.allDeadlines),ss('v',S.allVotes),ss('fc',S.allFinalised),ss('t',S.allTeams),ss('p',S.allPayments),ss('tp',S.allTeamPublished)]);
  toast('초기화됐습니다. 투표 기간을 다시 설정해 주세요.');
  renderAdmin();if(dkey===actDk())renderAll();
}
// dt picker
function buildDtP(id,isoVal){
  var d=isoVal?new Date(isoVal):null;
  var yr=d?d.getFullYear():new Date().getFullYear(),mo=d?d.getMonth()+1:new Date().getMonth()+1;
  var dy=d?d.getDate():new Date().getDate(),isAM=d?(d.getHours()<12):true,hr=d?(d.getHours()%12||12):12,mn=d?d.getMinutes():0;
  var yrs='';for(var y=2024;y<=2027;y++)yrs+='<option'+(yr===y?' selected':'')+'>'+y+'</option>';
  var mos='';for(var m=1;m<=12;m++)mos+='<option value="'+m+'"'+(mo===m?' selected':'')+'>'+m+'월</option>';
  var dys='';for(var dy2=1;dy2<=31;dy2++)dys+='<option value="'+dy2+'"'+(dy===dy2?' selected':'')+'>'+dy2+'일</option>';
  var hrs='';for(var h=1;h<=12;h++)hrs+='<option value="'+h+'"'+(hr===h?' selected':'')+'>'+pad(h)+'</option>';
  var mns='';[0,10,20,30,40,50].forEach(function(v){mns+='<option value="'+v+'"'+(mn===v?' selected':'')+'>'+pad(v)+'</option>';});
  return'<div class="dt-picker"><div class="dtp-row">'+
    '<select class="dtp-sel" id="'+id+'-y">'+yrs+'</select>'+
    '<select class="dtp-sel" id="'+id+'-mo">'+mos+'</select>'+
    '<select class="dtp-sel" id="'+id+'-d">'+dys+'</select>'+
    '<span class="dtp-sep">|</span>'+
    '<select class="dtp-sel" id="'+id+'-ap"><option value="AM"'+(isAM?' selected':'')+'>AM</option><option value="PM"'+(!isAM?' selected':'')+'>PM</option></select>'+
    '<select class="dtp-sel" id="'+id+'-h">'+hrs+'</select>'+
    '<span class="dtp-sep">:</span>'+
    '<select class="dtp-sel" id="'+id+'-m">'+mns+'</select>'+
    '</div></div>';
}
function readDtP(id){
  var get=function(sfx){var el=document.getElementById(id+'-'+sfx);return el?el.value:''};
  var yr=parseInt(get('y')),mo=parseInt(get('mo'))-1,dy=parseInt(get('d'));
  var ap=get('ap'),hr=parseInt(get('h')),mn=parseInt(get('m'));
  var h24=ap==='PM'?(hr===12?12:hr+12):(hr===12?0:hr);
  var dt=new Date(yr,mo,dy,h24,mn,0);return isNaN(dt.getTime())?null:dt.toISOString();
}
